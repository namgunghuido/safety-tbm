<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2b2620">
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="안전길잡이">
<link rel="apple-touch-icon" href="./apple-touch-icon-180.png">
<link rel="icon" type="image/png" href="./icon-192.png">
<title>건설현장 안전 길잡이</title>
<style>
  :root {
    /* 따뜻한 페이퍼 톤 */
    --bg: #f4f1ea;
    --surface: #fdfbf6;
    --surface-2: #efe9dc;
    --line: #d8d0bf;
    --line-strong: #2b2620;
    --text: #2b2620;
    --text-dim: #6b6253;
    --text-faint: #a39a8a;
    /* 헤더/강조 */
    --header-bg: #2b2620;
    --header-text: #f4f1ea;
    --header-dim: #a89e8c;
    --accent: #a0522d;
    /* 위험 색 */
    --danger: #a0382c;
    --danger-line: #e0c4ba;
    --danger-fill: #f6ece6;
    --caution: #b07012;
    --caution-line: #e6d6b0;
    --caution-fill: #f7efdd;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg); color:var(--text);
    max-width:480px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  header {
    padding:18px 20px 0;
    position:sticky; top:0; z-index:20; background:var(--header-bg);
    border-radius:0 0 16px 16px;
  }
  .hbar { display:flex; align-items:center; gap:11px; margin-bottom:16px; }
  .htitle { font-size:17px; font-weight:600; letter-spacing:-.2px; color:var(--header-text); }
  .lang-row { display:flex; gap:0; }
  .lang-btn {
    flex:0 0 auto; padding:10px 15px; border:none; background:none;
    color:var(--header-dim); font-size:14px; font-weight:500; cursor:pointer;
    border-bottom:2px solid transparent; transition:.15s;
  }
  .lang-btn.active { color:var(--header-text); border-bottom-color:var(--accent); font-weight:600; }

  main { flex:1; padding:20px; }
  .eyebrow {
    font-size:13px; font-weight:700; color:var(--text);
    letter-spacing:-.1px; margin-bottom:18px;
  }

  .gj-group { margin-bottom:22px; }
  .gj-head {
    font-size:12px; font-weight:700; color:var(--accent);
    letter-spacing:.3px; margin-bottom:10px;
    display:flex; align-items:center; gap:8px;
  }
  .gj-head::after { content:""; flex:1; height:1px; background:var(--line); }

  .task-grid { display:flex; flex-wrap:wrap; gap:11px; }
  .task-card {
    background:var(--surface); border:1.3px solid var(--line); border-radius:3px;
    padding:28px 14px 14px; cursor:pointer; transition:transform .12s, border-color .15s;
    display:flex; flex-direction:column; gap:10px; min-height:120px;
    position:relative; text-align:left;
    width:calc(50% - 6px); box-sizing:border-box;
  }
  .task-card:active { transform:scale(.975); }
  .task-card:hover { border-color:var(--text-faint); }
  .task-card .ico { width:32px; height:32px; color:var(--text); }
  .task-card .ico svg { width:100%; height:100%; display:block; }
  .task-card .ico-img { width:100%; height:100%; object-fit:contain; display:block; }
  .task-card .tname { font-size:13.5px; font-weight:700; line-height:1.35; color:var(--text); }
  .task-card .tgj { font-size:11px; color:var(--text-faint); font-weight:500; margin-top:auto; }
  .rlabel {
    position:absolute; top:13px; right:13px;
    font-size:10.5px; font-weight:700; letter-spacing:.2px;
  }
  .rlabel.high { color:var(--danger); }
  .rlabel.mid { color:var(--caution); }

  .detail { display:none; }
  .detail.show { display:block; }
  .back-btn {
    background:none; border:none; color:var(--text-dim); font-size:14px; font-weight:500;
    cursor:pointer; padding:4px 0; margin-bottom:18px;
  }
  .back-btn:active { color:var(--text); }

  .detail-head { margin-bottom:18px; }
  .detail-head .dtitle { font-size:22px; font-weight:700; line-height:1.3; letter-spacing:-.3px; color:var(--text); }
  .detail-head .dmeta { display:flex; align-items:center; gap:8px; margin-top:9px; }
  .rpill {
    font-size:11px; font-weight:700; padding:3px 9px; border-radius:3px;
  }
  .rpill.high { background:var(--danger-fill); color:var(--danger); border:1px solid var(--danger-line); }
  .rpill.mid { background:var(--caution-fill); color:var(--caution); border:1px solid var(--caution-line); }
  .dgj-text { font-size:12.5px; color:var(--text-dim); }

  .hero-scene {
    width:100%; height:240px; color:var(--danger);
    background:var(--surface); border:1.3px solid var(--line); border-radius:4px;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:22px; padding:20px;
  }
  .hero-scene svg { width:210px; height:210px; display:block; }

  .haz-item { margin-bottom:14px; border:1.3px solid var(--line); border-radius:4px; overflow:hidden; background:var(--surface); }
  .haz-head {
    display:flex; align-items:flex-start; gap:10px;
    padding:14px;
  }
  .haz-warn {
    flex:0 0 auto; width:22px; height:22px; border-radius:50%;
    background:var(--danger); color:#fff; font-weight:800; font-size:15px;
    display:flex; align-items:center; justify-content:center; margin-top:1px;
  }
  .haz-text {
    font-size:16px; font-weight:700; line-height:1.4; color:var(--text);
  }
  .act-row {
    display:flex; align-items:flex-start; gap:11px;
    padding:14px; background:var(--surface-2); border-top:1.3px solid var(--line);
  }
  .act-row .ai {
    width:24px; height:24px; flex:0 0 auto; color:var(--accent); margin-top:1px;
  }
  .act-row .ai svg { width:100%; height:100%; display:block; }
  .act-label { font-size:11px; color:var(--text-faint); font-weight:600; margin-bottom:3px; letter-spacing:.3px; }
  .act-text { font-size:14.5px; line-height:1.5; color:var(--text); font-weight:500; }

  .quiz {
    margin-top:6px;
  }
  .quiz-title { font-size:12px; font-weight:700; color:var(--accent); letter-spacing:.4px; margin-bottom:10px; }
  .quiz-task { font-size:13px; color:var(--text-dim); margin-bottom:6px; font-weight:600; }
  .quiz-q { font-size:18px; font-weight:700; line-height:1.45; margin-bottom:20px; color:var(--text); }
  .quiz-opts { display:flex; flex-direction:column; gap:10px; }
  .quiz-opt {
    background:var(--surface); border:1.3px solid var(--line); 
    color:var(--text); padding:16px; border-radius:3px; font-size:14.5px; font-weight:500;
    cursor:pointer; text-align:left; transition:.13s; line-height:1.45;
    display:flex; gap:11px; align-items:flex-start;
  }
  .quiz-opt .qnum {
    flex:0 0 auto; width:22px; height:22px; border-radius:50%;
    border:1.3px solid var(--text-faint); color:var(--text-dim);
    font-size:12px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }
  .quiz-opt:active { transform:scale(.99); }
  .quiz-opt.correct { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600; }
  .quiz-opt.correct .qnum { border-color:#fff; color:#fff; }
  .quiz-opt.wrong { background:var(--danger-fill); border-color:var(--danger); color:var(--danger); }
  .quiz-opt.wrong .qnum { border-color:var(--danger); color:var(--danger); }
  .quiz-opt.dim { opacity:.4; }
  .quiz-result {
    margin-top:18px; font-size:15px; font-weight:700; min-height:20px;
    padding:14px; border-radius:3px; text-align:center; display:none;
  }
  .quiz-result.show { display:block; }
  .quiz-result.ok { color:#fff; background:var(--accent); }
  .quiz-result.no { color:var(--danger); background:var(--danger-fill); border:1.3px solid var(--danger-line); }
  .quiz-retry {
    width:100%; margin-top:12px; padding:13px; border:1.3px solid var(--line); border-radius:3px;
    background:var(--surface); color:var(--text-dim); font-size:14px; font-weight:600; cursor:pointer;
    display:none;
  }
  .quiz-retry.show { display:block; }

  .next-btn {
    width:100%; margin-top:24px; padding:16px; border:none; border-radius:3px;
    background:var(--accent); color:#fff; font-size:15px; font-weight:700; cursor:pointer;
  }
  .next-btn:active { opacity:.85; }
  .print-btn {
    width:100%; margin-top:24px; padding:14px; border:1.3px solid var(--text); border-radius:3px;
    background:var(--surface); color:var(--text); font-size:14px; font-weight:600; cursor:pointer;
  }
  .print-btn:active { background:var(--text); color:var(--bg); }

  /* 완성 인포그래픽 이미지 모드 */
  .guide-img { width:100%; height:auto; display:block; border:1.3px solid var(--line); border-radius:11px; }
  @media print { .guide-img { border-color:#ccc !important; } }

  /* ===== 인포그래픽형 상세 화면 ===== */
  .guide-title {
    font-size:21px; font-weight:800; color:var(--danger);
    line-height:1.25; letter-spacing:-.4px; margin-bottom:7px;
  }
  .guide-meta { display:flex; align-items:center; gap:8px; margin-bottom:18px; }

  .haz-block {
    border:2px solid var(--danger-line); border-radius:13px;
    background:var(--surface); padding:13px 13px 14px; margin-bottom:15px;
  }
  .haz-block.mid { border-color:var(--caution-line); }
  .hb-title {
    display:flex; align-items:center; gap:9px;
    font-size:16.5px; font-weight:800; color:var(--danger);
    line-height:1.3; margin-bottom:12px;
  }
  .haz-block.mid .hb-title { color:var(--caution); }
  .hb-badge {
    flex:0 0 auto; width:24px; height:24px; border-radius:50%;
    background:var(--danger); color:#fff; font-weight:800; font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }
  .haz-block.mid .hb-badge { background:var(--caution); }

  .hb-body { display:flex; gap:11px; align-items:stretch; }
  .hb-measure {
    flex:1 1 0; min-width:0; background:var(--surface-2);
    border-radius:9px; padding:11px 12px; display:flex; flex-direction:column;
  }
  .hb-mlabel {
    display:flex; align-items:center; gap:6px;
    font-size:12px; font-weight:700; color:var(--accent); margin-bottom:7px;
  }
  .hb-mlabel svg { width:15px; height:15px; }
  .hb-mtext { font-size:14px; line-height:1.55; font-weight:600; color:var(--text); }
  .hb-illust { flex:0 0 47%; max-width:47%; height:150px; display:flex; align-items:center; justify-content:center; }
  .hb-illust svg { max-width:100%; max-height:100%; width:auto; height:auto; display:block; }
  .hb-illust-img { max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; display:block; border-radius:6px; }

  footer { padding:18px 20px 28px; color:var(--text-faint); font-size:11px; line-height:1.6; border-top:1px solid var(--line); }

  @media print {
    body { background:#fff; color:#000; }
    header,.eyebrow,.back-btn,.quiz,.print-btn,.next-btn,footer,.task-grid,.gj-group,#selectView,#quizView { display:none !important; }
    #detailView { display:block !important; }
    .haz-block,.hb-measure { border-color:#ccc !important; background:#fff !important; }
    .hb-mtext,.guide-title,.hb-title { color:#000 !important; }
  }
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="htitle" id="appTitle">건설현장 안전 길잡이</div>
  </div>
  <div class="lang-row" id="langRow"></div>
</header>

<main>
  <div id="selectView">
    <div class="eyebrow" id="selectTaskLabel">오늘의 작업을 선택하세요</div>
    <div id="taskList"></div>
  </div>

  <div class="detail" id="detailView">
    <button class="back-btn" id="backBtn">← 작업 다시 선택</button>
    <div class="detail-head" id="detailHead"></div>
    <div id="hazWrap"></div>
    <button class="next-btn" id="nextBtn">이해 확인하기 →</button>
  </div>

  <div class="detail" id="quizView">
    <button class="back-btn" id="quizBackBtn">← 안전지침 다시 보기</button>
    <div class="quiz" id="quizBox"></div>
    <button class="print-btn" id="printBtn">인쇄 / 저장</button>
  </div>
</main>

<footer>
  데이터 출처: KOSHA 건설업 사고사망 핵심위험요인(SIF) 평가표(2023) 분류체계 기반 재구성 · 학술 연구용 프로토타입
</footer>

function taskScene(d){
  const inner = TASK[d.id];
  if(!inner) return sceneSvg((d.picto.split(",")[0]||"").trim());
  return '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;">'+inner+'</svg>';
}
function sceneSvg(code){
  const inner = SCENE[code] || SCENE.struck;
  return '<svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:100%;">'+inner+'</svg>';
}
function svgWrap(inner, sw){
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(sw||1.5)+'" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';
}
function taskIcon(d){ return TASK_CARD_IMG[d.id] ? '<img class="ico-img" src="'+TASK_CARD_IMG[d.id]+'" alt="">' : svgWrap(ICONS[d.id] || '<circle cx="12" cy="12" r="9"/>', 1.5); }
function hazIcon(code){ return svgWrap(HAZ[code] || HAZ.struck, 1.6); }

let lang = "ko";

const langs = [["ko","한국어"],["en","EN"],["vi","Tiếng Việt"],["zh","中文"]];

function t(k){ return UI[lang][k]; }
function gjLabel(g){ return (GJ[g] && GJ[g][lang]) || g; }

function renderLangs(){
  const row = document.getElementById("langRow"); row.innerHTML="";
  langs.forEach(([code,label])=>{
    const b=document.createElement("button");
    b.className="lang-btn"+(code===lang?" active":""); b.textContent=label;
    b.onclick=()=>{ lang=code; renderAll(); };
    row.appendChild(b);
  });
}
function renderGrid(){
  const list=document.getElementById("taskList"); list.innerHTML="";
  const gjOrder=Object.keys(GJ).filter(g=>DATA.some(d=>d.gongjong===g));
  gjOrder.forEach(g=>{
    const items=DATA.filter(d=>d.gongjong===g);
    if(!items.length) return;
    const group=document.createElement("div"); group.className="gj-group";
    const head=document.createElement("div"); head.className="gj-head";
    head.textContent=gjLabel(g);
    group.appendChild(head);
    const grid=document.createElement("div"); grid.className="task-grid";
    items.forEach(d=>{
      const card=document.createElement("button"); card.className="task-card";
      const isHigh=d.risk==="상";
      card.innerHTML=
        '<span class="rlabel '+(isHigh?"high":"mid")+'">'+(isHigh?t("riskHigh"):t("riskMid"))+'</span>'+
        '<span class="ico">'+taskIcon(d)+'</span>'+
        '<span class="tname">'+d["task_"+lang]+'</span>';
      card.onclick=()=>showDetail(d);
      grid.appendChild(card);
    });
    group.appendChild(grid);
    list.appendChild(group);
  });
}

function fallbackIllust(d,n){
  const codes=d.picto.split(",").map(x=>x.trim());
  let inner;
  if(n===1 && TASK[d.id]) inner=TASK[d.id];
  else inner=SCENE[codes[n-1]]||SCENE[codes[0]]||SCENE.struck;
  return '<svg viewBox="0 0 100 100" fill="none" stroke="#2b2620" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" style="width:100%;height:auto;">'+inner+'</svg>';
}
function illustFor(d,n){
  const im=TASK_ILLUST[d.id];
  if(im && im["haz"+n]) return '<img class="hb-illust-img" src="'+im["haz"+n]+'" alt=""/>';
  const s2=SCENE2[d.id];
  if(s2 && s2["haz"+n]){
    const o=s2["haz"+n]; let svg=o.svg;
    if(o.G) svg=svg.replace("__G__", (o.G[lang]||o.G.ko));
    if(o.M) svg=svg.replace("__M__", (o.M[lang]||o.M.ko));
    return svg;
  }
  return fallbackIllust(d,n);
}

function showDetail(d){
  currentTask=d;
  document.getElementById("selectView").style.display="none";
  document.getElementById("quizView").classList.remove("show");
  document.getElementById("detailView").classList.add("show");
  const isHigh=d.risk==="상";
  const head=document.getElementById("detailHead");
  const haz=document.getElementById("hazWrap");


  head.innerHTML=
    '<div class="guide-title">'+d["task_"+lang]+' '+t("guideSuffix")+'</div>'+
    '<div class="guide-meta"><span class="rpill '+(isHigh?"high":"mid")+'">'+(isHigh?t("riskHigh"):t("riskMid"))+'</span>'+
    '<span class="dgj-text">'+gjLabel(d.gongjong)+'</span></div>';

  haz.innerHTML="";
  [1,2].forEach((n)=>{
    const block=document.createElement("div"); block.className="haz-block"+(isHigh?"":" mid");
    block.innerHTML=
      '<div class="hb-title"><span class="hb-badge">!</span><span>'+d["haz"+n+"_"+lang]+'</span></div>'+
      '<div class="hb-body">'+
        '<div class="hb-measure"><div class="hb-mlabel">'+CHECK_SVG+'<span>'+t("action")+'</span></div>'+
        '<div class="hb-mtext">'+d["act"+n+"_"+lang]+'</div></div>'+
        '<div class="hb-illust">'+illustFor(d,n)+'</div>'+
      '</div>';
    haz.appendChild(block);
  });
  document.getElementById("backBtn").textContent=t("backBtn");
  document.getElementById("nextBtn").textContent=t("nextBtn");
  window.scrollTo(0,0);
}
function showQuiz(){
  if(!currentTask) return;
  document.getElementById("detailView").classList.remove("show");
  document.getElementById("quizView").classList.add("show");
  document.getElementById("quizBackBtn").textContent=t("quizBack");
  document.getElementById("printBtn").textContent=t("print");
  renderQuiz(currentTask);
  window.scrollTo(0,0);
}
function renderQuiz(d){
  const q=QUIZ[d.id];
  const box=document.getElementById("quizBox");
  if(!q){ box.innerHTML="<div class='quiz-q'>"+t("quizQ")+"</div>"; return; }
  // 보기 셔플: 정답 텍스트를 기억하고 섞기
  const correctText=q[lang][q.correct];
  const shuffled=q[lang].map((text,idx)=>({text,isCorrect:idx===q.correct}));
  for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }

  box.innerHTML='<div class="quiz-title">'+t("quizTitle")+'</div>'+
    '<div class="quiz-task">'+d["task_"+lang]+'</div>'+
    '<div class="quiz-q">'+t("quizQ")+'</div>'+
    '<div class="quiz-opts" id="quizOpts"></div>'+
    '<div class="quiz-result" id="quizResult"></div>'+
    '<button class="quiz-retry" id="quizRetry">'+t("retry")+'</button>';
  const wrap=document.getElementById("quizOpts");
  shuffled.forEach((opt,i)=>{
    const b=document.createElement("button"); b.className="quiz-opt";
    b.innerHTML='<span class="qnum">'+(i+1)+'</span><span>'+opt.text+'</span>';
    b.onclick=()=>{
      if(wrap.dataset.done) return; wrap.dataset.done="1";
      const res=document.getElementById("quizResult");
      const retry=document.getElementById("quizRetry");
      Array.from(wrap.children).forEach(x=>{ if(x!==b) x.classList.add("dim"); });
      if(opt.isCorrect){ b.classList.add("correct"); res.textContent=t("correct"); res.className="quiz-result ok show"; }
      else {
        b.classList.add("wrong");
        Array.from(wrap.children).forEach(x=>{ if(x.querySelector("span:last-child").textContent===correctText){ x.classList.add("correct"); x.classList.remove("dim"); }});
        res.textContent=t("wrong"); res.className="quiz-result no show";
        retry.classList.add("show");
      }
    };
    wrap.appendChild(b);
  });
  document.getElementById("quizRetry").onclick=()=>renderQuiz(d);
}
function backToSelect(){
  document.getElementById("detailView").classList.remove("show");
  document.getElementById("quizView").classList.remove("show");
  document.getElementById("selectView").style.display="block";
}
function backToDetail(){
  document.getElementById("quizView").classList.remove("show");
  showDetail(currentTask);
}
function renderAll(){
  document.documentElement.lang=lang;
  document.getElementById("appTitle").textContent=t("appTitle");
  document.getElementById("selectTaskLabel").textContent=t("selectTask");
  renderLangs(); renderGrid();
  if(document.getElementById("detailView").classList.contains("show")||document.getElementById("quizView").classList.contains("show")) backToSelect();
}
document.getElementById("backBtn").onclick=backToSelect;
document.getElementById("nextBtn").onclick=showQuiz;
document.getElementById("quizBackBtn").onclick=backToDetail;
document.getElementById("printBtn").onclick=()=>window.print();
renderAll();
